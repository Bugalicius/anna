<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste — Agente Ana</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #e5ddd5; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #container { width: 420px; height: 90vh; background: #fff; display: flex; flex-direction: column; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.2); }
    #header { background: #075e54; color: #fff; padding: 14px 16px; font-size: 16px; font-weight: bold; }
    #header span { font-size: 12px; font-weight: normal; opacity: .8; display: block; }
    #messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .msg { max-width: 80%; padding: 8px 12px; border-radius: 8px; font-size: 14px; line-height: 1.4; white-space: pre-wrap; word-break: break-word; }
    .msg.bot { background: #dcf8c6; align-self: flex-start; border-bottom-left-radius: 2px; }
    .msg.user { background: #fff; align-self: flex-end; border-bottom-right-radius: 2px; border: 1px solid #e0e0e0; }
    .msg.typing { background: #dcf8c6; align-self: flex-start; color: #999; font-style: italic; }
    #footer { display: flex; padding: 10px; border-top: 1px solid #e0e0e0; gap: 8px; }
    #input { flex: 1; border: 1px solid #ccc; border-radius: 20px; padding: 8px 14px; font-size: 14px; outline: none; }
    #send { background: #075e54; color: #fff; border: none; border-radius: 50%; width: 38px; height: 38px; cursor: pointer; font-size: 18px; }
    #send:disabled { opacity: .5; cursor: default; }
    #reset { background: #e74c3c; color: #fff; border: none; border-radius: 4px; padding: 4px 10px; font-size: 12px; cursor: pointer; margin-left: auto; }
  </style>
</head>
<body>
<div id="container">
  <div id="header">
    Agente Ana — Teste
    <span>Simulação local · sem WhatsApp</span>
    <button id="reset" onclick="resetar()">Reiniciar conversa</button>
  </div>
  <div id="messages"></div>
  <div id="footer">
    <input id="input" type="text" placeholder="Digite uma mensagem..." autocomplete="off" />
    <button id="send" onclick="enviar()">➤</button>
  </div>
</div>

<script>
  // Número fixo para manter estado de conversa
  const PHONE = "5500000000001";

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("send");

  inputEl.addEventListener("keydown", e => { if (e.key === "Enter") enviar(); });

  function renderMsg(text) {
    // Detecta [IMG: filename.jpg] → <img>
    const imgMatch = text.match(/^\[IMG:\s*(.+?)\]$/);
    if (imgMatch) {
      const img = document.createElement("img");
      img.src = "/media/" + imgMatch[1].trim();
      img.style.maxWidth = "100%";
      img.style.borderRadius = "6px";
      return img;
    }
    // Detecta [PDF: filename.pdf] → link clicável
    const pdfMatch = text.match(/^\[PDF:\s*(.+?)\]$/);
    if (pdfMatch) {
      const a = document.createElement("a");
      const filename = pdfMatch[1].trim();
      // tenta localizar o arquivo com extensão .pdf
      const encoded = encodeURIComponent(filename.endsWith(".pdf") ? filename : filename + ".pdf");
      a.href = "/media/" + encoded;
      a.target = "_blank";
      a.textContent = "📄 " + filename;
      a.style.color = "#075e54";
      return a;
    }
    // Formata negrito *texto* e itálico _texto_
    const span = document.createElement("span");
    span.innerHTML = text
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/\*(.*?)\*/g, "<strong>$1</strong>")
      .replace(/_(.*?)_/g, "<em>$1</em>");
    return span;
  }

  function addMsg(text, type) {
    const d = document.createElement("div");
    d.className = "msg " + type;
    if (type === "bot") {
      d.appendChild(renderMsg(text));
    } else {
      d.textContent = text;
    }
    messagesEl.appendChild(d);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return d;
  }

  async function enviar() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = "";
    sendBtn.disabled = true;

    addMsg(text, "user");
    const typing = addMsg("digitando...", "typing");

    try {
      const res = await fetch("/test/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, phone: PHONE })
      });
      const data = await res.json();
      typing.remove();
      if (data.responses && data.responses.length > 0) {
        data.responses.forEach(r => addMsg(r, "bot"));
      } else {
        addMsg("(sem resposta)", "bot");
      }
    } catch (e) {
      typing.remove();
      addMsg("Erro ao conectar com o servidor.", "bot");
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  async function resetar() {
    await fetch("/test/reset", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ phone: PHONE }) });
    messagesEl.innerHTML = "";
    addMsg("Conversa reiniciada.", "typing");
  }
</script>
</body>
</html>
