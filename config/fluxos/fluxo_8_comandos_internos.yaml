# ═══════════════════════════════════════════════════════════════════════════
# FLUXO 8 — COMANDOS INTERNOS (Thaynara e Breno)
# ═══════════════════════════════════════════════════════════════════════════

fluxo_id: "comandos_internos"
fluxo_nome: "Comandos internos da Thaynara e do Breno"

# ───────────────────────────────────────────────────────────────────────────
# CONTEXTO DE ENTRADA
# ───────────────────────────────────────────────────────────────────────────
# Disparado SEMPRE que chega mensagem de número autorizado:
#   - Thaynara: 5531991394759
#   - Breno: 5531992059211
#
# Ambos podem usar TODOS os comandos abaixo.
# Mensagens desses números NUNCA são tratadas como paciente.
# Comandos em linguagem livre — Gemini interpreta.

# ───────────────────────────────────────────────────────────────────────────
# NÚMEROS AUTORIZADOS
# ───────────────────────────────────────────────────────────────────────────
numeros_autorizados:
  - phone: "5531991394759"
    nome: "Thaynara"
  - phone: "5531992059211"
    nome: "Breno"

# ───────────────────────────────────────────────────────────────────────────
# COMANDOS SUPORTADOS
# ───────────────────────────────────────────────────────────────────────────
comandos_suportados:
  
  consultar_status_paciente:
    descricao: "Solicita status/dados de um paciente"
    exemplos:
      - "Qual o status da Maria Silva?"
      - "Me dá os dados da Maria"
      - "Como está a Maria Silva?"
    parametros_extracao:
      - nome_paciente
    saida: "resumo formatado com dados"
  
  perguntar_paciente_troca_horario:
    descricao: "Solicita que agente pergunte ao paciente sobre troca de horário"
    exemplos:
      - "Pergunta a Maria se pode vir às 10h ao invés das 9h"
      - "Vê se a Ana Beatriz topa trocar pras 14h"
    parametros_extracao:
      - nome_paciente
      - horario_atual
      - novo_horario
    fluxo_completo:
      1: "agente identifica paciente"
      2: "agente envia pergunta ao paciente"
      3: "aguarda resposta do paciente"
      4: "se aceitar: remarca no Dietbox + notifica quem pediu"
      5: "se recusar: notifica quem pediu"
  
  cancelar_consulta:
    descricao: "Cancela consulta de um paciente"
    exemplos:
      - "Cancela a consulta da Maria"
      - "Desmarca a Ana Beatriz de hoje"
    parametros_extracao:
      - nome_paciente
      - data_consulta (opcional - se múltiplas)
    acao: "PUT desmarcada=true no Dietbox"
  
  remarcar_consulta:
    descricao: "Reagenda paciente para nova data/hora"
    exemplos:
      - "Reagenda Maria para sexta às 10h"
      - "Muda a consulta da Ana de quinta pra sexta"
    parametros_extracao:
      - nome_paciente
      - nova_data
      - novo_horario
    acao: "remarcar no Dietbox + notificar quem pediu"
  
  responder_escalacao:
    descricao: "Resposta para escalação pendente — agente repassa adaptado ao paciente"
    exemplos:
      - (Breno respondendo dúvida clínica)
      - "Sim, pode comer pão integral"
      - "Diz que ela pode trocar"
    fluxo:
      1: "sistema identifica escalação pendente"
      2: "Gemini adapta resposta ao tom da Ana"
      3: "envia ao paciente original"
      4: "marca escalação como resolvida"
  
  enviar_mensagem_para_paciente:
    descricao: "Manda mensagem específica para paciente"
    exemplos:
      - "Manda pra Maria: 'lembrei que esqueci de mandar a receita'"
      - "Diz pra Ana que estou atrasada"
    parametros_extracao:
      - nome_paciente
      - texto_mensagem
    fluxo:
      1: "identifica paciente"
      2: "adapta tom (se necessário)"
      3: "envia mensagem"
      4: "confirma envio para quem pediu"

# ───────────────────────────────────────────────────────────────────────────
# ESTADOS
# ───────────────────────────────────────────────────────────────────────────
estados:

  # ════════════════════════════════════════════════════════════════════════
  # ESTADO 1 — MENSAGEM RECEBIDA DE NÚMERO AUTORIZADO
  # ════════════════════════════════════════════════════════════════════════
  comando_recebido:
    descricao: "Identifica e classifica o comando"
    
    on_enter:
      acao: "interpretar_comando_via_gemini"
      input:
        texto: "{mensagem.texto}"
        remetente: "{Thaynara | Breno}"
        contexto_escalacoes_pendentes: "{state.escalacoes_pendentes}"
      saida:
        comando_identificado:
          enum:
            - consultar_status_paciente
            - perguntar_paciente_troca_horario
            - cancelar_consulta
            - remarcar_consulta
            - responder_escalacao
            - enviar_mensagem_para_paciente
            - nao_reconhecido
        parametros_extraidos: object
        confidence: float
    
    situacoes:
      
      classificou_status:
        trigger: "comando=consultar_status_paciente"
        proximo_estado: "executar_status"
      
      classificou_pergunta_horario:
        trigger: "comando=perguntar_paciente_troca_horario"
        proximo_estado: "executar_pergunta_troca_horario"
      
      classificou_cancelamento:
        trigger: "comando=cancelar_consulta"
        proximo_estado: "executar_cancelamento_administrativo"
      
      classificou_remarcacao:
        trigger: "comando=remarcar_consulta"
        proximo_estado: "executar_remarcacao_administrativa"
      
      classificou_resposta_escalacao:
        trigger: "comando=responder_escalacao"
        proximo_estado: "executar_resposta_escalacao"
      
      classificou_envio_mensagem:
        trigger: "comando=enviar_mensagem_para_paciente"
        proximo_estado: "executar_envio_mensagem"
      
      nao_reconhecido:
        trigger: "comando=nao_reconhecido OR confidence < 0.7"
        resposta: |
          Não entendi o comando 😅 Pode reformular?
        proximo_estado: "comando_recebido"

  # ════════════════════════════════════════════════════════════════════════
  # ESTADO 2 — EXECUTAR STATUS
  # ════════════════════════════════════════════════════════════════════════
  executar_status:
    descricao: "Busca dados do paciente e responde"
    
    on_enter:
      acao: "tool_buscar_paciente_completo"
      input:
        nome: "{parametros.nome_paciente}"
      
      apos_busca:
        se_encontrou:
          resposta_template: |
            📋 Status — {nome_paciente}
            
            👤 Status: {status}
            📞 Telefone: {telefone}
            📅 Última consulta: {ultima_consulta}
            📆 Próxima consulta: {proxima_consulta}
            📋 Plano: {plano} ({modalidade})
            💰 Pagamento: {status_pagamento}
            🔔 Confirmação presença: {status_confirmacao}
          proximo_estado: "comando_concluido"
        
        se_nao_encontrou:
          resposta: |
            Não encontrei paciente com esse nome 😕 Pode me passar o nome completo?
          proximo_estado: "comando_recebido"
        
        se_multiplos:
          resposta_template: |
            Encontrei {n} pacientes com esse nome:
            {lista_pacientes}
            
            Sobre qual?
          proximo_estado: "comando_recebido"

  # ════════════════════════════════════════════════════════════════════════
  # ESTADO 3 — EXECUTAR PERGUNTA DE TROCA DE HORÁRIO
  # ════════════════════════════════════════════════════════════════════════
  executar_pergunta_troca_horario:
    descricao: "Manda pergunta ao paciente sobre troca de horário"
    
    on_enter:
      acoes_em_sequencia:
        1_buscar_paciente:
          acao: "tool_buscar_paciente_completo"
          input:
            nome: "{parametros.nome_paciente}"
        
        2_enviar_pergunta_ao_paciente:
          mensagem_template: |
            Oi {primeiro_nome_paciente}! 💚 A Thaynara pediu pra eu te perguntar se você conseguiria trocar sua consulta de {horario_atual} para às {novo_horario}. Consegue?
          destino: "{paciente.telefone}"
        
        3_marcar_aguardando_resposta:
          salva_no_state_do_paciente:
            aguardando_resposta_comando: true
            contexto_comando:
              tipo: "troca_horario"
              quem_pediu: "{Thaynara | Breno}"
              horario_atual: "{horario_atual}"
              novo_horario: "{novo_horario}"
        
        4_confirmar_pra_quem_pediu:
          resposta_template: |
            ✅ Enviado pra {nome_paciente}. Aguardando resposta.
          destino: "{quem_pediu.telefone}"
      
      proximo_estado: "comando_concluido"

  # ════════════════════════════════════════════════════════════════════════
  # ESTADO 4 — EXECUTAR CANCELAMENTO ADMINISTRATIVO
  # ════════════════════════════════════════════════════════════════════════
  executar_cancelamento_administrativo:
    descricao: "Thaynara/Breno cancela consulta de um paciente"
    
    on_enter:
      acoes_em_sequencia:
        1_buscar_consulta_ativa:
          acao: "tool_buscar_consulta_ativa_paciente"
        
        2_pedir_confirmacao_se_multiplas:
          condicao: "se múltiplas consultas encontradas"
          resposta_template: |
            Encontrei {n} consultas ativas pra {nome_paciente}:
            {lista_consultas}
            
            Qual cancelar?
          proximo_estado: "aguardando_escolha_consulta_cancelar"
        
        3_cancelar_no_dietbox:
          acao: "tool_cancelar_dietbox"
          operacao: "PUT desmarcada=true"
        
        4_notificar_paciente:
          # Pergunta se quer notificar paciente ou não
          resposta_para_quem_pediu_template: |
            ✅ Consulta de {nome_paciente} desmarcada no Dietbox.
            
            Quer que eu avise o paciente? (sim/não)
          proximo_estado: "aguardando_decisao_notificar"

  # ════════════════════════════════════════════════════════════════════════
  # ESTADO 5 — EXECUTAR REMARCAÇÃO ADMINISTRATIVA
  # ════════════════════════════════════════════════════════════════════════
  executar_remarcacao_administrativa:
    descricao: "Thaynara/Breno remarca diretamente sem consultar paciente"
    
    on_enter:
      acoes_em_sequencia:
        1_buscar_consulta_ativa:
          acao: "tool_buscar_consulta_ativa_paciente"
        
        2_validar_novo_slot:
          acao: "tool_validar_slot_disponivel_dietbox"
          input:
            nova_data: "{parametros.nova_data}"
            novo_horario: "{parametros.novo_horario}"
        
        3_se_slot_indisponivel:
          condicao: "slot ocupado ou fora da grade"
          resposta_template: |
            ⚠️ Horário {nova_data} {novo_horario} indisponível.
            Motivo: {motivo}
          proximo_estado: "comando_concluido"
        
        4_executar_remarcacao:
          acao: "tool_remarcar_dietbox"
        
        5_notificar_paciente:
          mensagem_template: |
            Oi {primeiro_nome_paciente}! 💚 Houve uma alteração na sua consulta:
            
            📅 Nova data: {dia_semana}, {data} às {hora}
            
            Qualquer coisa, estou à disposição! 💚
          destino: "{paciente.telefone}"
        
        6_confirmar_pra_quem_pediu:
          resposta_template: |
            ✅ {nome_paciente} remarcada para {nova_data} às {novo_horario}. Paciente avisado.
      
      proximo_estado: "comando_concluido"

  # ════════════════════════════════════════════════════════════════════════
  # ESTADO 6 — EXECUTAR RESPOSTA DE ESCALAÇÃO
  # ════════════════════════════════════════════════════════════════════════
  executar_resposta_escalacao:
    descricao: "Breno/Thaynara responde uma escalação pendente — agente repassa ao paciente"
    
    on_enter:
      acoes_em_sequencia:
        1_identificar_escalacao:
          # Sistema procura nas escalações pendentes
          # Pode haver múltiplas — usa contexto da mensagem ou pergunta
          acao: "identificar_escalacao_alvo"
          se_multiplas_pendentes:
            resposta_para_quem_pediu: |
              Tem escalações pendentes de:
              {lista_pacientes_com_perguntas}
              
              Pra quem é essa resposta?
            proximo_estado: "aguardando_clarificacao_escalacao"
        
        2_adaptar_resposta_tom_ana:
          permite_improviso: true
          instrucao_para_llm: |
            Adapte a resposta para o tom da Ana — curto, caloroso, com 💚.
            
            REGRAS:
            - NUNCA mencione Breno ou Thaynara como autores da resposta
            - Apresente como se fosse a própria Ana respondendo após verificar
            - Se for dúvida clínica e paciente é cadastrado, pode finalizar com 
              contato da Thaynara (5531991394759)
            - Se for lead novo, finalize perguntando se quer agendar
        
        3_enviar_ao_paciente:
          acao: "tool_enviar_mensagem_paciente"
        
        4_marcar_escalacao_resolvida:
          salva_no_state_do_paciente:
            escalacao.status: "resolvida"
            escalacao.respondida_em: "{timestamp}"
        
        5_confirmar_pra_quem_respondeu:
          resposta_template: |
            ✅ Resposta enviada para {nome_paciente}.
      
      proximo_estado: "comando_concluido"

  # ════════════════════════════════════════════════════════════════════════
  # ESTADO 7 — EXECUTAR ENVIO DE MENSAGEM
  # ════════════════════════════════════════════════════════════════════════
  executar_envio_mensagem:
    descricao: "Thaynara/Breno pede pra mandar mensagem específica ao paciente"
    
    on_enter:
      acoes_em_sequencia:
        1_buscar_paciente:
          acao: "tool_buscar_paciente_por_nome"
        
        2_adaptar_mensagem_tom_ana:
          permite_improviso: true
          instrucao_para_llm: |
            Adapte o texto pro tom da Ana — curto, caloroso, com 💚.
            Não mencione Thaynara/Breno como autora.
            Apresente como se fosse a Ana falando.
            Se o texto já estiver no tom certo, use direto.
        
        3_enviar:
          acao: "tool_enviar_mensagem_paciente"
        
        4_confirmar:
          resposta_template: |
            ✅ Mensagem enviada para {nome_paciente}.
      
      proximo_estado: "comando_concluido"

  # ════════════════════════════════════════════════════════════════════════
  # ESTADO 8 — COMANDO CONCLUÍDO
  # ════════════════════════════════════════════════════════════════════════
  comando_concluido:
    descricao: "Comando executado"
    on_enter:
      acoes:
        - "registrar_comando_no_log"
        - "limpar_estado_comando_se_terminou"

# ───────────────────────────────────────────────────────────────────────────
# REGRAS INVIOLÁVEIS
# ───────────────────────────────────────────────────────────────────────────
regras_invioláveis:
  
  numeros_autorizados_obrigatorio:
    descricao: "Mensagens só são tratadas como comando se vier de número autorizado"
    aplica_em_estados: TODOS
  
  nunca_mencionar_thaynara_breno_no_paciente:
    descricao: "Mesmo em comando interno, ao retransmitir pro paciente NUNCA mencionar autores"
    aplica_em_estados:
      - executar_pergunta_troca_horario
      - executar_remarcacao_administrativa
      - executar_resposta_escalacao
      - executar_envio_mensagem
  
  confirmar_acao_administrativa:
    descricao: "Toda ação que afeta paciente é confirmada pra quem pediu"
    aplica_em_estados: TODOS

# ───────────────────────────────────────────────────────────────────────────
# TOOLS
# ───────────────────────────────────────────────────────────────────────────
tools:
  
  interpretar_comando_via_gemini:
    descricao: "Classifica comando + extrai parâmetros"
    output:
      comando: enum
      parametros: object
      confidence: float
  
  buscar_paciente_completo:
    descricao: "Busca dados completos do paciente no Dietbox + Redis"
  
  buscar_consulta_ativa_paciente:
    descricao: "Lista consultas ativas (futuras) do paciente"
  
  enviar_mensagem_paciente:
    descricao: "Manda mensagem WhatsApp pro paciente real"
