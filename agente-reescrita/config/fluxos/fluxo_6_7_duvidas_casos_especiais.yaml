# ═══════════════════════════════════════════════════════════════════════════
# FLUXO 6 — DÚVIDAS (sem agendamento ativo)
# ═══════════════════════════════════════════════════════════════════════════

fluxo_id: "duvidas"
fluxo_nome: "Dúvidas operacionais e clínicas"
estado_inicial: "duvida_recebida"
estado_final: "duvida_concluida"

# ───────────────────────────────────────────────────────────────────────────
# CONTEXTO DE ENTRADA
# ───────────────────────────────────────────────────────────────────────────
# Este fluxo é acionado quando:
#   1. Paciente faz uma pergunta sem ter intenção clara de agendar ainda
#   2. Paciente faz pergunta durante outro fluxo (intercepta, responde, retorna)
#   3. Pergunta clínica (escala silenciosamente OU envia contato da Thaynara
#      se for paciente já cadastrado)

# ───────────────────────────────────────────────────────────────────────────
# ESTADOS
# ───────────────────────────────────────────────────────────────────────────
estados:

  # ════════════════════════════════════════════════════════════════════════
  # ESTADO 1 — DÚVIDA RECEBIDA (classifica e roteia)
  # ════════════════════════════════════════════════════════════════════════
  duvida_recebida:
    descricao: "Identifica tipo de dúvida"
    
    on_enter:
      acao: "classificar_duvida"
      categorias:
        - duvida_operacional       # valores, horários, política, modalidade
        - duvida_clinica           # alimentos, dieta, sintomas, suplementos, medicamento
        - duvida_sobre_thaynara    # quem é, formação, especialidade
        - duvida_sobre_clinica     # endereço, estacionamento, equipe
        - duvida_processo          # como funciona, primeira consulta, retorno
        - pergunta_indicacao       # programa de indicação
        - pergunta_dupla_familia   # desconto família/dupla
    
    situacoes:
      
      duvida_operacional:
        trigger: "categoria=duvida_operacional"
        proximo_estado: "responder_duvida_operacional"
      
      duvida_clinica_paciente_existente:
        trigger: "categoria=duvida_clinica AND state.collected_data.status_paciente=retorno"
        proximo_estado: "encaminhar_para_thaynara"
      
      duvida_clinica_lead_novo:
        trigger: "categoria=duvida_clinica AND state.collected_data.status_paciente!=retorno"
        proximo_estado: "escalar_breno_silencioso"
      
      duvida_sobre_thaynara:
        trigger: "categoria=duvida_sobre_thaynara"
        proximo_estado: "responder_sobre_thaynara"
      
      duvida_sobre_clinica:
        trigger: "categoria=duvida_sobre_clinica"
        proximo_estado: "responder_sobre_clinica"
      
      duvida_processo:
        trigger: "categoria=duvida_processo"
        proximo_estado: "responder_duvida_processo"
      
      pergunta_indicacao:
        trigger: "categoria=pergunta_indicacao OR texto_contem=[indicação, indicar, indiquei]"
        proximo_estado: "responder_programa_indicacao"
      
      pergunta_dupla_familia:
        trigger: "categoria=pergunta_dupla_familia OR texto_contem=[dupla, família, casal, junto, dois]"
        proximo_estado: "responder_consulta_dupla"

  # ════════════════════════════════════════════════════════════════════════
  # ESTADO 2 — RESPONDER DÚVIDA OPERACIONAL
  # ════════════════════════════════════════════════════════════════════════
  responder_duvida_operacional:
    descricao: "Responde com base no FAQ e knowledge base"
    
    on_enter:
      permite_improviso: true
      instrucao_para_llm: |
        Identifique a pergunta específica dentro de "duvida_operacional".
        Possíveis subcategorias:
          - duração consulta
          - diferença online vs presencial
          - acompanhamento (suporte, check-ins, ajustes)
          - se sai com dieta pronta
          - prescrição de suplementos
          - formas de pagamento
          - sinal/pagamento antecipado
          - prazo de remarcação
          - prazo de retorno expirado
          - bioimpedância / como mede gordura
          - tolerância de atraso
          - endereço da clínica
        
        Use as respostas EXATAS do FAQ (knowledge_base/faq.json).
        Se a pergunta não tiver match exato no FAQ, use o knowledge_base
        completo, mantenha curto e termine perguntando se ajuda.
        Termine com: "Quer agendar uma consulta?" se for lead novo.
      
      apos_resposta: "voltar_para_fluxo_anterior_ou_oferecer_agendamento"

  # ════════════════════════════════════════════════════════════════════════
  # ESTADO 3 — ENCAMINHAR PRA THAYNARA (paciente existente, dúvida clínica)
  # ════════════════════════════════════════════════════════════════════════
  encaminhar_para_thaynara:
    descricao: "Paciente já cadastrado fez dúvida clínica — envia contato"
    
    on_enter:
      mensagem_template: |
        Como sua pergunta é sobre acompanhamento clínico, é melhor falar direto com a Thaynara, que pode te orientar com toda atenção que merece 💚
      acoes_em_sequencia:
        - tipo: "delay"
          segundos: 1
        - tipo: "enviar_contato"
          numero: "5531991394759"
          nome: "Thaynara Teixeira"
        - tipo: "delay"
          segundos: 1
        - tipo: "enviar_texto"
          texto: |
            Pode mandar sua dúvida direto pra ela 😊
      proximo_estado: "duvida_concluida"

  # ════════════════════════════════════════════════════════════════════════
  # ESTADO 4 — ESCALAR BRENO SILENCIOSO (lead novo, dúvida clínica)
  # ════════════════════════════════════════════════════════════════════════
  escalar_breno_silencioso:
    descricao: "Lead novo com dúvida clínica — escala internamente, paciente não vê contato"
    
    on_enter:
      acao: "notificar_breno_duvida_clinica"
      mensagem_breno_template: |
        🔔 Dúvida clínica de lead novo
        
        Paciente: {nome_se_houver} ({telefone})
        Pergunta: "{pergunta_original}"
        Contexto: {state.goal} | {state.status}
        
        Aguarda orientação para responder.
      
      resposta_paciente: |
        Só um instante, vou verificar essa informação certinho pra você 💚
      
      proximo_estado: "aguardando_resposta_breno"

  # ════════════════════════════════════════════════════════════════════════
  # ESTADO 5 — AGUARDANDO RESPOSTA DO BRENO
  # ════════════════════════════════════════════════════════════════════════
  aguardando_resposta_breno:
    descricao: "Sistema parado aguardando Breno responder via comando interno"
    
    situacoes:
      
      breno_respondeu:
        trigger: "comando_interno_breno_responder_paciente"
        permite_improviso: true
        instrucao_para_llm: |
          Adapte a resposta do Breno para o tom da Ana (curto, caloroso).
          Não cite o Breno em hipótese alguma.
          Apresente como se fosse a própria Ana respondendo após verificar.
          Exemplo: "Sobre [tópico]: [resposta adaptada]. Posso te ajudar com mais alguma coisa? 💚"
        proximo_estado: "duvida_concluida"
      
      paciente_mandou_outra_mensagem_enquanto_espera:
        trigger: "qualquer_mensagem_paciente"
        resposta: |
          Ainda estou verificando, te respondo em alguns instantes 💚
        proximo_estado: "aguardando_resposta_breno"
      
      timeout_15_minutos:
        trigger: "tempo_sem_resposta_breno > 15min"
        resposta: |
          A equipe está verificando sua dúvida e vai retornar em breve, tá? 💚
        proximo_estado: "duvida_concluida"

  # ════════════════════════════════════════════════════════════════════════
  # ESTADO 6 — RESPONDER SOBRE THAYNARA
  # ════════════════════════════════════════════════════════════════════════
  responder_sobre_thaynara:
    descricao: "Responde quem é a Thaynara, formação, método"
    
    on_enter:
      permite_improviso: true
      instrucao_para_llm: |
        Use a knowledge_base seção 2.1 (Sobre a Profissional).
        Mencione:
          - Nutricionista CRN9 31020
          - Método #NutriTransforma
          - Acompanhamento próximo, ajustes constantes
          - Sem dietas extremas
        Mantenha curto. NÃO cite Instagram da Thaynara a menos que perguntem especificamente.
        Termine perguntando: "Quer agendar uma consulta pra conhecer melhor o trabalho dela?"
      proximo_estado: "duvida_concluida"

  # ════════════════════════════════════════════════════════════════════════
  # ESTADO 7 — RESPONDER SOBRE A CLÍNICA
  # ════════════════════════════════════════════════════════════════════════
  responder_sobre_clinica:
    descricao: "Endereço, ambiente, estrutura"
    
    on_enter:
      resposta: |
        O consultório fica na Aura Clinic & Beauty:
        📍 Rua Melo Franco, 204/Sala 103, Jardim da Glória, Vespasiano/MG
        https://maps.app.goo.gl/XxHgHxHh7aCxitDs8
        
        Quer agendar uma consulta? 💚
      proximo_estado: "duvida_concluida"

  # ════════════════════════════════════════════════════════════════════════
  # ESTADO 8 — RESPONDER DÚVIDA PROCESSO
  # ════════════════════════════════════════════════════════════════════════
  responder_duvida_processo:
    descricao: "Como funciona consulta, primeira vs retorno, acompanhamento"
    
    on_enter:
      permite_improviso: true
      instrucao_para_llm: |
        Use knowledge_base seções 2.4 (Modalidades) e FAQ.
        Adapte conforme pergunta específica.
        Termine perguntando se quer agendar.
      proximo_estado: "duvida_concluida"

  # ════════════════════════════════════════════════════════════════════════
  # ESTADO 9 — RESPONDER PROGRAMA DE INDICAÇÃO
  # ════════════════════════════════════════════════════════════════════════
  responder_programa_indicacao:
    descricao: "Explica o programa Indique e Ganhe"
    
    on_enter:
      resposta: |
        Que ótimo que você quer indicar! 💚

        Nosso programa Indique e Ganhe:
        🎁 1 indicação: Acesso à Assistente Virtual Lilly + E-book exclusivo
        🎁 2 indicações: Kit personalizado (Mochilinha + Necessaire)
        🎁 3 indicações: 10% de desconto no próximo plano
        🎁 5 indicações: Consulta extra gratuita

        Como funciona: o amigo indicado menciona seu nome no agendamento. A recompensa é liberada após a consulta do indicado ser realizada 😊

        Posso te ajudar com mais alguma coisa?
      proximo_estado: "duvida_concluida"

  # ════════════════════════════════════════════════════════════════════════
  # ESTADO 10 — RESPONDER CONSULTA DUPLA / DESCONTO FAMÍLIA
  # ════════════════════════════════════════════════════════════════════════
  responder_consulta_dupla:
    descricao: "Explica regras de consulta em dupla com desconto"
    
    on_enter:
      resposta: |
        Que legal vocês fazerem juntos! 💚

        Em dupla tem 10% de desconto pra cada um, mas as consultas precisam ser realizadas juntas (no mesmo dia, em horários sequenciais — exemplo: 13h e 14h).

        O tratamento é individual, só a consulta presencial é junto.

        Quer seguir com a marcação em dupla? Pra começar, vou precisar dos dados de cada um 😊
      proximo_estado: "duvida_concluida"
      # Próxima mensagem deve ativar fluxo de agendamento em modo DUPLA (Fluxo 7.4)

  # ════════════════════════════════════════════════════════════════════════
  # ESTADO 11 — DÚVIDA CONCLUÍDA
  # ════════════════════════════════════════════════════════════════════════
  duvida_concluida:
    descricao: "Pergunta respondida — fluxo encerra ou retorna ao anterior"
    on_enter:
      decisao_dinamica:
        se_estava_em_outro_fluxo:
          acao: "retornar_para_fluxo_anterior"
        se_lead_novo_sem_fluxo:
          acao: "manter_estado_aguardando_proxima_mensagem"
      
      acoes:
        - "registrar_pergunta_no_faq_aprendido"  # pra melhorar respostas futuras

# ───────────────────────────────────────────────────────────────────────────
# REGRAS INVIOLÁVEIS
# ───────────────────────────────────────────────────────────────────────────
regras_invioláveis:
  
  nunca_expor_breno:
    descricao: "Em hipótese alguma menciona o nome ou número do Breno"
    palavras_proibidas:
      - "Breno"
      - "31 99205-9211"
      - "31992059211"
      - "5531992059211"
    aplica_em_estados: TODOS
  
  contato_thaynara_so_para_pacientes_existentes:
    descricao: "Número da Thaynara só envia para paciente já cadastrado"
    aplica_em_estados:
      - encaminhar_para_thaynara
  
  nao_inventar_resposta_clinica:
    descricao: "LLM NUNCA responde dúvida clínica direto — sempre escala"
    aplica_em_estados:
      - escalar_breno_silencioso

# ───────────────────────────────────────────────────────────────────────────
# TOOLS
# ───────────────────────────────────────────────────────────────────────────
tools:
  
  classificar_duvida:
    descricao: "Classifica tipo de dúvida via Gemini"
    output: enum de categorias
  
  notificar_breno_duvida_clinica:
    descricao: "Envia mensagem ao Breno com contexto da dúvida"
    destino: "5531992059211"
  
  registrar_pergunta_no_faq_aprendido:
    descricao: "Salva no faq_aprendido.json pra melhorar futuras respostas"


# ═══════════════════════════════════════════════════════════════════════════
# FLUXO 7 — CASOS ESPECIAIS
# ═══════════════════════════════════════════════════════════════════════════

fluxo_id: "casos_especiais"
fluxo_nome: "Casos especiais (gestante, menor, terceiro, dupla, B2B)"

# ───────────────────────────────────────────────────────────────────────────
# CONTEXTO DE ENTRADA
# ───────────────────────────────────────────────────────────────────────────
# Este fluxo é acionado por INTERCEPTAÇÃO de outros fluxos quando detecta:
#   - Idade < 16 (no cadastro ou em texto livre)
#   - Gravidez declarada
#   - Paciente declara que está marcando pra outra pessoa
#   - Pergunta sobre consulta em dupla
#   - Mensagem de B2B / parceria comercial

# ───────────────────────────────────────────────────────────────────────────
# ESTADOS
# ───────────────────────────────────────────────────────────────────────────
estados:

  # ════════════════════════════════════════════════════════════════════════
  # 7.1 GESTANTE
  # ════════════════════════════════════════════════════════════════════════
  detectou_gestante:
    descricao: "Paciente declarou estar grávida"
    
    on_enter:
      verificacao_inicial: "tem_pergunta_clinica_junto?"
      
      caso_a_gestante_sem_pergunta_clinica:
        # Apenas declarou que é gestante, sem dúvida clínica específica
        resposta: |
          Infelizmente a Thaynara não realiza atendimento para gestantes no momento 😔
          
          Qualquer outra dúvida, estou à disposição! 💚
        proximo_estado: "caso_especial_concluido"
      
      caso_b_gestante_com_pergunta_clinica:
        # Ex: "Tô grávida e tomo metformina, posso?"
        # ESCALA — não responde como nutricionista
        action: "escalar_breno_silencioso"
        resposta_paciente: |
          Deixa eu verificar essa informação certinho com a equipe e já te respondo, tá? 💚
        proximo_estado: "aguardando_orientacao_breno"

  # ════════════════════════════════════════════════════════════════════════
  # 7.2 MENOR DE 16 ANOS
  # ════════════════════════════════════════════════════════════════════════
  detectou_menor_16:
    descricao: "Paciente tem menos de 16 anos"
    
    on_enter:
      resposta: |
        Infelizmente a Thaynara não realiza atendimento para menores de 16 anos no momento 😔
        
        Qualquer outra dúvida, estou à disposição! 💚
      proximo_estado: "caso_especial_concluido"
      
      acao_se_pagamento_ja_feito:
        # Cenário crítico: pagamento já entrou, descobriu idade só no cadastro
        action: "escalar_breno_com_contexto_reembolso"
        mensagem_breno_template: |
          🔔 Pagamento de menor de 16 anos
          
          Paciente: {nome}
          Telefone: {telefone}
          Valor pago: R$ {valor_pago}
          
          Necessário acertar reembolso ou redirecionar para outro profissional.
        resposta_paciente: |
          Como o pagamento já foi feito, vou avisar a equipe pra acertar isso com você. Em alguns instantes te respondo 💚
        proximo_estado: "aguardando_orientacao_breno"

  # ════════════════════════════════════════════════════════════════════════
  # 7.3 MARCAÇÃO PARA TERCEIRO (ex: filha marcando pra mãe)
  # ════════════════════════════════════════════════════════════════════════
  detectou_marcacao_para_terceiro:
    descricao: "Paciente declarou que quer marcar pra outra pessoa"
    
    on_enter:
      mensagem_template: |
        Que carinho! 💚 Pra eu agendar certinho, preciso de alguns dados de quem vai ser atendida:

        👉 Nome completo
        👉 Idade ou data de nascimento
        👉 É gestante? (sim/não)

        E me confirma: você quer continuar a conversa por aqui ou prefere que eu fale direto com ela?
      
      salva_no_estado:
        flags.marcacao_para_terceiro: true
        marcador.telefone: "{telefone_atual}"
      
      proximo_estado: "coletando_dados_terceiro"

  # ════════════════════════════════════════════════════════════════════════
  # 7.3B COLETANDO DADOS DO TERCEIRO
  # ════════════════════════════════════════════════════════════════════════
  coletando_dados_terceiro:
    descricao: "Coleta dados básicos do paciente real (não quem está conversando)"
    
    intents_aceitas:
      - informar_dados_terceiro
      - confirmar_quem_conversa
    
    situacoes:
      
      coletou_dados_basicos:
        trigger: "tem_nome_completo=true AND tem_idade=true"
        validacoes:
          - se_idade_menor_16: "redirecionar_para_detectou_menor_16"
          - se_gestante_sem_clinica: "redirecionar_para_detectou_gestante"
          - se_ok: "seguir_fluxo_agendamento_modo_terceiro"
        salva_no_estado:
          paciente.nome: "{nome_terceiro}"
          paciente.idade: "{idade_terceiro}"
          paciente.gestante: "{gestante_resposta}"
      
      vai_continuar_pelo_marcador:
        trigger: "texto_contem=[eu mesmo, continuo eu, prefiro aqui, comigo]"
        salva_no_estado:
          flags.conversa_segue_com_marcador: true
        action: "ativar_fluxo_agendamento_modo_terceiro"
      
      quer_repassar_pra_paciente:
        trigger: "texto_contem=[fala com ela, manda pra ela, ela atende]"
        resposta: |
          Beleza! Me manda o WhatsApp dela que entro em contato 💚
        proximo_estado: "aguardando_numero_terceiro"

  # ════════════════════════════════════════════════════════════════════════
  # 7.3C AGUARDANDO NÚMERO DO TERCEIRO
  # ════════════════════════════════════════════════════════════════════════
  aguardando_numero_terceiro:
    descricao: "Marcador informou que quer repassar contato"
    
    situacoes:
      
      informou_numero:
        trigger: "tem_numero_whatsapp_valido=true"
        resposta_marcador: |
          Show! Vou entrar em contato com ela direto. Obrigada! 💚
        acao: "agendar_primeira_mensagem_para_paciente_real"
        mensagem_para_paciente_real_template: |
          Oi! 💚 Sou a Ana, da Nutri Thaynara Teixeira.
          {nome_marcador} entrou em contato querendo agendar uma consulta pra você. Posso te ajudar com isso? 😊
        proximo_estado: "caso_especial_concluido"

  # ════════════════════════════════════════════════════════════════════════
  # 7.4 CONSULTA EM DUPLA (DESCONTO FAMÍLIA)
  # ════════════════════════════════════════════════════════════════════════
  consulta_dupla_aceita:
    descricao: "Paciente confirmou que quer fazer consulta em dupla"
    
    on_enter:
      mensagem: |
        Perfeito! Vamos fazer juntos então 💚

        Pra começar, me manda o nome completo de cada uma de vocês 😊
      
      salva_no_estado:
        flags.modo_dupla: true
        flags.desconto_familia_10pct: true
        paciente_a: {}
        paciente_b: {}
      
      proximo_estado: "coletando_dupla_dados"

  coletando_dupla_dados:
    descricao: "Coleta nome e dados de AMBAS as pacientes"
    
    intents_aceitas:
      - informar_dados_dupla
    
    situacoes:
      
      coletou_ambos_nomes:
        trigger: "tem_nome_paciente_a=true AND tem_nome_paciente_b=true"
        action: "seguir_fluxo_agendamento_modo_dupla"
        # Daqui em diante o fluxo de agendamento é seguido normalmente,
        # mas com regras especiais:
        #   - aplicar 10% desconto em cada plano
        #   - buscar 2 horários sequenciais (ex: 13h e 14h)
        #   - cadastro de AMBAS no Dietbox
        #   - 2 lançamentos financeiros separados
      
      so_um_nome:
        trigger: "tem_nome_paciente_a=true XOR tem_nome_paciente_b=true"
        resposta: |
          Anotei {nome_recebido}! Falta o nome completo da outra pessoa 😊
        proximo_estado: "coletando_dupla_dados"

  # ════════════════════════════════════════════════════════════════════════
  # 7.5 B2B / PARCERIA COMERCIAL
  # ════════════════════════════════════════════════════════════════════════
  detectou_oferta_b2b:
    descricao: "Identificou que é uma empresa querendo oferecer serviço/parceria"
    
    triggers_classificacao:
      - texto_contem=[empresa, parceria, oferecer, serviço, b2b, vendemos, gostaríamos, prestadora]
      - tem_cnpj_no_texto=true
      - tom_corporativo=true
    
    on_enter:
      resposta: |
        Oi! Aqui é o canal de atendimento aos pacientes da nutricionista Thaynara Teixeira 💚
        
        Pra propostas comerciais, peça que envie um e-mail para [email_comercial_thaynara] que ela retorna assim que possível.
        
        Obrigada pelo interesse!
      
      acao_interna: "notificar_breno_tentativa_b2b"
      mensagem_breno_template: |
        📩 Tentativa de contato B2B
        Empresa/contato: {dados_extraidos}
        Telefone: {telefone}
        Mensagem original: "{texto_original}"
      
      salva_no_estado:
        flags.encerrado_b2b: true
        flags.ignorar_proximas_mensagens_24h: true
      
      proximo_estado: "caso_especial_concluido"
    
    situacoes:
      
      insistiu_apos_resposta:
        trigger: "qualquer_mensagem AND state.flags.encerrado_b2b=true AND dentro_de_24h"
        action: "ignorar_silenciosamente"

  # ════════════════════════════════════════════════════════════════════════
  # ESTADO FINAL — CASO ESPECIAL CONCLUÍDO
  # ════════════════════════════════════════════════════════════════════════
  caso_especial_concluido:
    descricao: "Caso especial resolvido"
    on_enter:
      acoes:
        - "registrar_metrica_caso_especial"

  # ════════════════════════════════════════════════════════════════════════
  # ESTADO — AGUARDANDO ORIENTAÇÃO BRENO
  # ════════════════════════════════════════════════════════════════════════
  aguardando_orientacao_breno:
    descricao: "Caso especial complexo escalado"
    on_enter:
      acoes:
        - "manter_estado_redis"
        - "registrar_escalacao"

# ───────────────────────────────────────────────────────────────────────────
# REGRAS INVIOLÁVEIS
# ───────────────────────────────────────────────────────────────────────────
regras_invioláveis:
  
  recusar_gestante_sempre:
    descricao: "Gestante sem dúvida clínica = recusa direta"
    aplica_em_estados:
      - detectou_gestante
  
  recusar_menor_16_sempre:
    descricao: "Menor de 16 = recusa direta"
    aplica_em_estados:
      - detectou_menor_16
  
  validar_idade_no_cadastro:
    descricao: "Calcula idade pela data de nascimento ANTES de criar agendamento"
    aplica_em_estados: TODOS
  
  desconto_dupla_so_sob_solicitacao:
    descricao: "NUNCA oferecer 10% de desconto dupla proativamente"
    aplica_em_estados: TODOS
    notas: |
      Regra explícita da seção 2.3 da documentação:
      O agente NÃO deve oferecer esse desconto proativamente. 
      Só conceder se o paciente perguntar sobre desconto para família/dupla/casal.
  
  horarios_sequenciais_em_dupla:
    descricao: "Quando dupla, buscar 2 horários sequenciais no mesmo dia"
    aplica_em_estados:
      - coletando_dupla_dados
  
  b2b_ignorar_apos_resposta:
    descricao: "Após responder uma vez B2B, ignorar próximas mensagens por 24h"
    aplica_em_estados:
      - detectou_oferta_b2b

