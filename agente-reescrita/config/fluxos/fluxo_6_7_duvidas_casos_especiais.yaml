tools:
  
  detectar_idade_paciente:
    descricao: "Calcula idade pela data de nascimento ou texto livre"
    input:
      texto: str
      data_nascimento: date (opcional)
    output:
      idade: int
      confidence: float
  
  detectar_gravidez:
    descricao: "Identifica menção de gravidez no texto"
    input:
      texto: str
    output:
      eh_gestante: bool
      tem_pergunta_clinica_junto: bool
  
  detectar_b2b:
    descricao: "Identifica se é contato comercial vs paciente"
    output:
      eh_b2b: bool
      tipo: enum [parceria, fornecedor, recrutamento, vendas, outro]
  
  notificar_breno_tentativa_b2b:
    descricao: "Avisa Breno sobre tentativa de contato comercial"
    destino: "5531992059211"
