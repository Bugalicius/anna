# ═══════════════════════════════════════════════════════════════════════════
# REGRAS INVIOLÁVEIS GLOBAIS (rules.py)
# Aplicáveis em TODOS os fluxos, em TODAS as respostas
# ═══════════════════════════════════════════════════════════════════════════

regras_invioláveis_globais:
  
  R1_nunca_expor_breno:
    descricao: "Em hipótese alguma mencionar nome ou número do Breno em mensagem ao paciente"
    palavras_proibidas:
      - "Breno"
      - "31 99205-9211"
      - "31992059211"
      - "5531992059211"
      - "(31) 99205-9211"
    apply_in: TODAS_AS_MENSAGENS_AO_PACIENTE
    severidade: BLOCKING
  
  R2_contato_thaynara_apenas_paciente_existente:
    descricao: "Número da Thaynara (5531991394759) só pode ser enviado para paciente já cadastrado em caso de dúvida clínica"
    apply_in: TODAS_AS_MENSAGENS_AO_PACIENTE
    severidade: BLOCKING
    excecoes:
      - "no fluxo de confirmação de presença online (envia contato como instrução de envio de fotos)"
      - "no fluxo de confirmação final (etapa 4.9.2 - apenas online)"
  
  R3_nunca_inventar_valor:
    descricao: "Valores monetários SEMPRE vêm da tabela de planos. LLM NUNCA decide preço"
    apply_in: TODAS_AS_MENSAGENS_QUE_CITAM_VALOR
    severidade: BLOCKING
    fallback: "usar valor da tabela"
  
  R4_nunca_oferecer_horario_fora_grade:
    descricao: "Nunca propor horário que não esteja na grade ou em domingo/sábado/sexta noite"
    apply_in: OFERTA_DE_SLOTS
    severidade: BLOCKING
  
  R5_nunca_confirmar_sem_pagamento:
    descricao: "Agendamento só vira confirmado APÓS pagamento confirmado pelo sistema"
    apply_in: CRIACAO_AGENDAMENTO_DIETBOX
    severidade: BLOCKING
  
  R6_nunca_aceitar_sinal_abaixo_50pct:
    descricao: "PIX abaixo de 50% do valor do plano nunca aprova agendamento"
    apply_in: VALIDACAO_COMPROVANTE
    severidade: BLOCKING
  
  R7_nunca_dar_orientacao_clinica:
    descricao: "LLM jamais responde dúvida clínica como se fosse nutricionista"
    apply_in: TODAS_AS_RESPOSTAS
    severidade: BLOCKING
  
  R8_nunca_responder_b2b_proativamente:
    descricao: "Tentativas comerciais recebem 1 resposta e depois são ignoradas por 24h"
    apply_in: DETECCAO_B2B
    severidade: WARNING
  
  R9_desconto_dupla_nunca_proativo:
    descricao: "Desconto 10% família/dupla SÓ se paciente perguntar"
    apply_in: TODAS_AS_OFERTAS
    severidade: BLOCKING
  
  R10_validar_idade_antes_de_agendar:
    descricao: "Idade < 16 = recusar (validar pela data de nascimento)"
    apply_in: COLETA_CADASTRO
    severidade: BLOCKING
  
  R11_recusar_gestante_sem_clinica:
    descricao: "Gestante sem dúvida clínica = recusa direta"
    apply_in: DETECCAO_GESTANTE
    severidade: BLOCKING
  
  R12_validar_nome_nao_generico:
    descricao: "Nome com palavras genéricas (consulta, agendar, oi, sim, etc) é REJEITADO"
    apply_in: COLETA_NOME
    severidade: BLOCKING
    lista_proibida:
      - "consulta"
      - "agendar"
      - "marcar"
      - "retorno"
      - "plano"
      - "pagamento"
      - "horário"
      - "horario"
      - "manhã"
      - "manha"
      - "tarde"
      - "noite"
      - "presencial"
      - "online"
      - "pix"
      - "cartão"
      - "cartao"
      - "oi"
      - "olá"
      - "ola"
      - "sim"
      - "não"
      - "nao"
      - "ok"
      - "tudo"
      - "bem"
      - "quero"
      - "preciso"
      - "gostaria"
  
  R13_nunca_sobrescrever_nome_ja_salvo:
    descricao: "Se nome já está no estado, não sobrescrever sem correção explícita do paciente"
    apply_in: APLICAR_TURNO_NO_ESTADO
    severidade: BLOCKING
  
  R14_dietbox_sempre_via_put_desmarcada:
    descricao: "Cancelamento/desmarcação SEMPRE via PUT desmarcada=true (mantém histórico)"
    apply_in: CANCELAMENTO_DIETBOX
    severidade: BLOCKING
  
  R15_nunca_informar_perda_valor:
    descricao: "Nunca dizer ao paciente que 'valor não será reembolsado'"
    apply_in: CANCELAMENTO_OU_DESMARCACAO
    severidade: BLOCKING
  
  R16_comprovante_sempre_encaminhar_thaynara:
    descricao: "Todo comprovante APROVADO encaminhado para Thaynara com resumo"
    apply_in: APROVACAO_COMPROVANTE
    severidade: BLOCKING

